name: Generate and Post USL Content

on:
  schedule:
    # Run every Tuesday and Thursday at 10 AM UTC
    - cron: '0 10 * * 2,4'
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate_and_post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline orchestrator
        env:
          # LLM API credentials
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          
          # TTS API credentials (ElevenLabs or similar)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          
          # Instagram credentials (for instagrapi)
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          
          # Optional: External APIs
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
          
          # Output directory
          OUTPUT_DIR: ./output
        run: |
          python src/orchestrator.py

      - name: Upload artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: generated-content
          path: ./output/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed. Check logs above."
          exit 1
